version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: qap_postgres
    restart: always
    environment:
      POSTGRES_USER: qap_user
      POSTGRES_PASSWORD: qap_password
      POSTGRES_DB: qap_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
