<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css?v=2">
    <script src="/static/js/app.js" defer></script>
</head>
<body>
    <button class="mobile-nav-toggle" id="mobile-nav-toggle">
        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <svg width="32" height="32" viewBox="0 0 32 32">
                <circle cx="16" cy="16" r="16" fill="var(--accent)" opacity="0.2"/>
                <circle cx="16" cy="16" r="8" fill="var(--accent)"/>
            </svg>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span>Home</span>
            </a>
            <a href="/tests" class="nav-link {% if request.url.path.startswith('/tests') %}active{% endif %}">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                <span>Tests</span>
            </a>
            <a href="/runs" class="nav-link {% if request.url.path.startswith('/runs') %}active{% endif %}">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span>Runs</span>
            </a>
            <a href="/settings" class="nav-link {% if request.url.path.startswith('/settings') %}active{% endif %}">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span>Settings</span>
            </a>
            <a href="/ai/studio" class="nav-link {% if request.url.path.startswith('/ai/studio') %}active{% endif %}">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                <span>AI Studio</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="status-indicator">
                <span class="dot bg-gray" id="rec-status-dot"></span>
                <span id="rec-status-text">Idle</span>
            </div>
            <div class="status-indicator mt-1">
                <span class="dot bg-green"></span>
                <span>Ready</span>
            </div>
        </div>
    </aside>
    <main class="main-content">
        <div class="breadcrumb">
            {% block breadcrumb %}{% endblock %}
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </main>
    <div id="toast-container"></div>
    <div id="lightbox" class="lightbox hidden">
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Screenshot">
            <div class="lightbox-controls">
                <button id="lightbox-prev" class="btn btn-secondary">Prev</button>
                <button id="lightbox-next" class="btn btn-secondary">Next</button>
                <button id="lightbox-close" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>
    
    <!-- Command Palette -->
    <div id="command-palette" class="modal hidden">
        <div class="modal-content" style="padding: 20px;">
            <input type="text" id="cmd-input" class="input w-full text-lg mb-4" placeholder="Type a command or search... (e.g., 'Go to Tests')">
            <div id="cmd-results" class="flex flex-col gap-2 max-h-[300px] overflow-y-auto">
                <!-- Results populated by JS -->
            </div>
            <div class="text-xs text-secondary mt-4 text-center">Press <kbd class="px-1 py-0.5 bg-elevated rounded border border-strong">Esc</kbd> to close</div>
        </div>
    </div>
</body>
</html>
